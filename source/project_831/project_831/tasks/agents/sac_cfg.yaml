name: sac
class: agent.sac.SACAgent
params:
  obs_dim: 24
  action_dim: 7
  action_range: [-1, 1]
  device: cuda:0
  # critic_cfg: ${double_q_critic}
  # actor_cfg: ${diag_gaussian_actor}
  discount: 0.99
  init_temperature: 0.1
  alpha_lr: 0.0001
  alpha_betas: [0.9, 0.999]
  actor_lr: 0.0001
  actor_betas: [0.9, 0.999]
  actor_update_frequency: 1
  critic_lr: 0.0001
  critic_betas: [0.9, 0.999]
  critic_tau: 0.005
  critic_target_update_frequency: 2
  batch_size: 1024
  learnable_temperature: true
  
  critic_cfg:
    obs_dim: 24
    action_dim: 7
    hidden_dim: 1024
    hidden_depth: 2
  
  actor_cfg:
    obs_dim: 24
    action_dim: 7
    hidden_depth: 2
    hidden_dim: 1024
    log_std_bounds: [-5, 2]